version: 2
updates:
  # Keep the pinned action SHAs current (opens PRs that bump both the
  # SHA and the trailing version comment).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Track the PHP dev/runtime dependencies in composer.json.
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
